<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase's Going Away & Birthday Bash RSVP</title>
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #d4af37;
            --text-light: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-color);
            color: var(--text-light);
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #2a2a2a;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: var(--accent-color); margin-top: 0; }
        h3 { margin-bottom: 5px; }

        .flyer-img {
            max-width: 100%;
            height: auto;
            margin: 20px auto;
            display: block;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .timer-box {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .time-unit {
            background: var(--primary-color);
            padding: 15px;
            border-radius: 8px;
            min-width: 60px;
            border: 1px solid var(--accent-color);
        }
        .time-unit span {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
        }
        .time-unit label {
            font-size: 12px;
            text-transform: uppercase;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }
        input, select, button {
            padding: 12px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }
        button {
            background-color: var(--accent-color);
            color: var(--primary-color);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #f1c40f; }
        #message { margin-top: 15px; font-weight: bold; display: none; }
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>Chase's Going Away & Birthday Bash!</h1>
    <p>A New Chapter Begins! Join us for a Pool Party. We can't wait to celebrate.</p>

    <img src="image.png" alt="Chase's Going Away and Birthday Bash Flyer" class="flyer-img">

    <h3>Time Remaining to RSVP:</h3>
    <div class="timer-box" id="countdown">
        <div class="time-unit"><span id="days">00</span><label>Days</label></div>
        <div class="time-unit"><span id="hours">00</span><label>Hours</label></div>
        <div class="time-unit"><span id="minutes">00</span><label>Mins</label></div>
        <div class="time-unit"><span id="seconds">00</span><label>Secs</label></div>
    </div>

    <form id="rsvpForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" required placeholder="John Doe">

        <label for="email">Email Address</label>
        <input type="email" id="email" required placeholder="john@example.com">

        <label for="phone">Phone Number (For Text Reminders)</label>
        <input type="tel" id="phone" required placeholder="443-600-0152">

        <label for="attending">Will you be attending?</label>
        <select id="attending" required>
            <option value="yes">Yes, I'll be there!</option>
            <option value="no">No, I can't make it.</option>
        </select>

        <button type="submit" id="submitBtn">Submit RSVP</button>
        <div id="message"></div>
    </form>
</div>

<script>
    // RSVP deadline mapped to flyer: July 17, 2026
    const rsvpDeadline = new Date("July 17, 2026 23:59:59").getTime();

    const timer = setInterval(function() {
        const now = new Date().getTime();
        const distance = rsvpDeadline - now;

        if (distance < 0) {
            clearInterval(timer);
            document.getElementById("countdown").innerHTML = "<h3 style='color:red;'>RSVP Deadline has passed!</h3>";
            document.getElementById("rsvpForm").style.display = "none";
            return;
        }

        document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
        document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        document.getElementById("minutes").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
        document.getElementById("seconds").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
    }, 1000);

    document.getElementById('rsvpForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submitBtn');
        const msgDiv = document.getElementById('message');
        
        btn.disabled = true;
        btn.innerText = "Submitting...";

        const guestData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            attending: document.getElementById('attending').value
        };

        try {
            const response = await fetch('/.netlify/functions/rsvp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(guestData)
            });

            const result = await response.json();

            if (response.ok) {
                msgDiv.className = "success";
                msgDiv.innerText = "Thanks! Your RSVP has been received.";
                document.getElementById('rsvpForm').reset();
            } else {
                throw new Error(result.error || "Failed to submit RSVP");
            }
        } catch (error) {
            msgDiv.className = "error";
            msgDiv.innerText = "Error: " + error.message;
        } finally {
            msgDiv.style.display = "block";
            btn.disabled = false;
            btn.innerText = "Submit RSVP";
        }
    });
</script>

</body>
</html>
